<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Balakumaran T - Portfolio</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans&family=Poppins:wght@500;700&display=swap" rel="stylesheet">

  <style>

    body {
      font-family: 'Open Sans', sans-serif;
      text-align: center;
      margin: 0;
      padding: 0;
      background-color: #0a192f;
      color: #ffffff;
      overflow-x: hidden;
    }

    h1, h2, h3, h4 {
      font-family: 'Poppins', sans-serif;
    }

    video.bg-video {
      position: fixed;
      top: 0;
      left: 0;
      min-width: 100%;
      min-height: 100%;
      object-fit: cover;
      z-index: -1;
    }

    .container {
      max-width: 1000px;
      margin: 60px auto;
      padding: 20px;
      border-radius: 10px;
      background-color: rgba(10, 25, 47, 0.85);
      box-shadow: 2px 2px 12px rgba(255, 255, 255, 0.1);
    }

    .btn {
      display: inline-block;
      margin: 10px 5px;
      padding: 10px 20px;
      text-decoration: none;
      background-color: #1e3a8a;
      color: white;
      border-radius: 5px;
      transition: 0.3s;
    }

    .btn:hover {
      background-color: #172554;
    }

    a {
      color: #60a5fa;
    }

    a:hover {
      color: #ffffff;
    }

    .project-row {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 30px;
      flex-wrap: wrap;
    }

    .project {
      flex: 1;
      min-width: 300px;
      background-color: rgba(255, 255, 255, 0.05);
      padding: 15px;
      border-radius: 8px;
    }

    .scrolling-banner {
      overflow: hidden;
      white-space: nowrap;
      padding: 10px 0;
      margin: 30px 0;
      background-color: rgba(255, 255, 255, 0.05);
      border-radius: 8px;
    }

    .scrolling-text {
      display: inline-block;
      padding-left: 100%;
      animation: scrollRight 25s linear infinite;
      font-size: 20px;
    }

    @keyframes scrollRight {
      0% { transform: translateX(0%); }
      100% { transform: translateX(-100%); }
    }

    iframe.pdf-preview {
      width: 100%;
      height: 400px;
      border: none;
      border-radius: 10px;
      box-shadow: 0 0 12px rgba(255,255,255,0.1);
      margin-bottom: 10px;
    }

    footer {
      margin-top: 40px;
      font-size: 14px;
      color: #94a3b8;
    }

    .contact-input {
      width: 80%;
      padding: 10px;
      margin: 10px;
      border-radius: 5px;
      border: none;
    }

  </style>
</head>

<body>

  <!-- Background Video -->
  <video class="bg-video" autoplay muted loop playsinline>
    <source src="background-video.mp4" type="video/mp4">
  </video>

  <div class="container">

    <h1>Greetings, Welcome to Bala's Portfolio</h1>
    <h2>Actively building expertise in AWS and DevOps</h2>

    <p><strong>Connect me at:</strong> +91 9952319725</p>
    <p><strong>Email:</strong> bkbala3710@gmail.com</p>

    <a class="btn" href="https://www.linkedin.com/in/bala3710/" target="_blank">LinkedIn</a>
    <a class="btn" href="https://github.com/bkbala3710" target="_blank">GitHub</a>
    <a class="btn" href="CI-CD.pdf" target="_blank">Resume</a>

    <!-- Scrolling Banner -->
    <div class="scrolling-banner">
      <div class="scrolling-text">
        Welcome to my portfolio 🚀 Passionate about AWS & DevOps 💻
      </div>
    </div>

    <h3>Projects</h3>

    <!-- Your projects stay same (shortened here for clarity) -->

    <!-- Contact Section -->
    <hr style="margin:40px 0; border-color:#334155;">

    <h3>Contact Me</h3>

    <form id="contactForm">

      <input class="contact-input" type="text" id="name"
       placeholder="Your Name" required><br>

      <input class="contact-input" type="email" id="email"
       placeholder="Your Email" required><br>

      <textarea class="contact-input" id="message"
       placeholder="Your Message" required></textarea><br>

      <button class="btn" type="submit">Send Message</button>

    </form>

    <p id="result"></p>

    <footer>
      <p>© 2025 Balakumaran T. All rights reserved.</p>
    </footer>

  </div>


  <!-- JavaScript -->
  <script>

    document.getElementById("contactForm").addEventListener("submit", function(e){

      e.preventDefault();

      document.getElementById("result").innerText = "Sending...";

      fetch("PASTE_YOUR_API_URL_HERE", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          name: document.getElementById("name").value,
          email: document.getElementById("email").value,
          message: document.getElementById("message").value
        })
      })

      .then(res => res.text())

      .then(data => {
        document.getElementById("result").innerText = "✅ Message Sent!";
        document.getElementById("contactForm").reset();
      })

      .catch(err => {
        document.getElementById("result").innerText = "❌ Error! Try again.";
      });

    });

  </script>

</body>
</html>
